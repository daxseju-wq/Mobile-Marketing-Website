<!DOCTYPE html>
<html>
<head>
<title>Cart - D Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
*{margin:0; padding:0; box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    color:#fff;

    background: linear-gradient(270deg,#0f2027,#1a2a6c,#2c5364,#000000);
    background-size:600% 600%;
    animation:bgMove 18s infinite alternate;
}

@keyframes bgMove{
    0%{background-position:left;}
    100%{background-position:right;}
}

/* NAVBAR */
nav{
    background:rgba(0,0,0,0.5);
    padding:15px;
    text-align:center;
    backdrop-filter: blur(12px);
}

nav a{
    color:#eee;
    margin:10px;
    text-decoration:none;
    font-size:18px;
    transition:0.4s;
}

nav a:hover{
    color:#00f7ff;
    text-shadow:0 0 12px #00f7ff;
}

/* TITLE */
h1{
    text-align:center;
    margin:25px;
    font-size:42px;
    color:#00f7ff;
    text-shadow:0 0 20px #00f7ff;
}

/* CART */
.cart{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

/* CARD */
.item{
    width:260px;
    margin:20px;
    padding:20px;
    border-radius:15px;

    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);

    text-align:center;

    transform:translateY(60px);
    opacity:0;
    animation:fadeUp 0.8s forwards;
}

.item:nth-child(1){animation-delay:0.2s;}
.item:nth-child(2){animation-delay:0.4s;}
.item:nth-child(3){animation-delay:0.6s;}
.item:nth-child(4){animation-delay:0.8s;}

@keyframes fadeUp{
    to{
        transform:translateY(0);
        opacity:1;
    }
}

/* HOVER */
.item:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 0 25px #00f7ff;
}

.item h3{
    color:#ff4ecd;
    margin-bottom:8px;
}

.item p{
    color:#00f7ff;
    font-size:18px;
}

/* BUTTON */
.checkout{
    padding:14px 30px;
    margin-top:20px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;

    background:linear-gradient(90deg,#ff4ecd,#00f7ff);
    color:white;

    position:relative;
    overflow:hidden;

    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 10px #ff4ecd;}
    100%{box-shadow:0 0 25px #00f7ff;}
}

.checkout::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:-100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
    transition:0.5s;
}

.checkout:hover::after{
    left:100%;
}

/* POPUP */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);

    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    backdrop-filter: blur(15px);
    animation:fadeIn 0.6s ease;
}

/* BOX */
.qr-box{
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:20px;
    text-align:center;

    box-shadow:0 0 30px #00f7ff;
    animation:zoomIn 0.6s ease;
}

@keyframes zoomIn{
    from{transform:scale(0.5); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

/* QR IMAGE */
.qr-box img{
    width:230px;
    height:230px;
    border-radius:12px;
    box-shadow:0 0 25px #00f7ff;
    animation:float 3s infinite ease-in-out;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

.qr-box h2{
    color:#00f7ff;
    margin-bottom:10px;
}

.qr-box p{
    color:#ccc;
    margin-top:10px;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="strategy.html">Strategy</a>
<a href="campaign.html">Campaign</a>
<a href="cart.html">🛒 Cart</a>
<a href="Serv.html">Services</a>
<a href="Cont.html">Contact</a>
</nav>

<h1>🛒 Your Cart</h1>

<div class="cart" id="cartItems"></div>

<div style="text-align:center;">
<button class="checkout" onclick="checkout()">Pay with GPay 💳</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="qr-box">
        <h2>Scan & Pay</h2>

        <!-- 🔥 CHANGE IMAGE HERE -->
        <img src="C:\Users\DAKSH\OneDrive\Desktop\SMM\WhatsApp Image 2026-04-15 at 18.27.04.jpeg">

        <p>Use Google Pay to scan</p>
    </div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let html = "";

cart.forEach((item)=>{
    html += `
    <div class="item">
        <h3>${item.name}</h3>
        <p>₹${item.price}</p>
    </div>
    `;
});

document.getElementById("cartItems").innerHTML = html;

/* 💳 PAYMENT FLOW */
function checkout(){

    if(cart.length === 0){
        alert("Cart Empty ❌");
        return;
    }

    let popup = document.getElementById("popup");
    let qrBox = document.querySelector(".qr-box");

    popup.style.display="flex";

    /* 🔥 SUCCESS AFTER 5 SEC */
    setTimeout(()=>{

        qrBox.innerHTML = `
            <h2 style="color:#00ff88; text-shadow:0 0 20px #00ff88;">
                ✅ Payment Successful
            </h2>

            <p style="margin-top:15px; font-size:18px;">
                Thank you for your purchase 🎉
            </p>

            <p style="margin-top:10px; color:#ccc;">
                Redirecting to Home...
            </p>
        `;

        localStorage.removeItem("cart");

    },5000);

    /* 🔥 REDIRECT */
    setTimeout(()=>{
        window.location.href="home.html";
    },8000);
}

</script>

</body>
</html>
